# railway.toml — Briefly deployment configuration
#
# Single web service — Flask server + embedded APScheduler.
# Newsletter pull and job analysis run on schedule inside the web process.
#
# Deploy steps:
#   1. railway login
#   2. railway init   (run once, links repo to Railway project)
#   3. railway up     (deploy)
#   4. Add a Volume in the Railway dashboard → mount at /data
#   5. Set environment variables in Railway dashboard (see .env.example)

[build]
builder = "nixpacks"        # Railway auto-detects Python — no Dockerfile needed

# ---------------------------------------------------------------------------
# Web service — inbound webhook + dashboard API
# ---------------------------------------------------------------------------
[[services]]
name = "web"
startCommand = "python server.py"

[services.variables]
PORT = "8080"
FLASK_DEBUG = "0"

[services.deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
